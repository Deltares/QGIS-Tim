name: release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Release ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions: write-all
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macOS-latest
          - windows-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v7
      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.6
      - name: Build with PyInstaller and create backend ZIP
        run: pixi run zip-backend
      - name: Create GitHub release if missing
        if: matrix.os == 'ubuntu-latest'
        run: gh release create -d "${{ github.ref_name }}" --notes "Release ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Release backend ZIP
        run: gh release upload --clobber ${{ github.ref_name }} dist/gistim-${{ runner.os }}.zip dist/sha256-checksum-${{ runner.os }}.txt
        env:
          GITHUB_TOKEN: ${{ github.TOKEN }}
      - name: Create plugin ZIP
        if: matrix.os == 'ubuntu-latest'
        run: pixi run zip-plugin
      - name: Release plugin ZIP
        if: matrix.os == 'ubuntu-latest'
        run: gh release upload --clobber ${{ github.ref_name }} dist/QGIS-Tim-plugin.zip
        env:
          GITHUB_TOKEN: ${{ github.TOKEN }}
